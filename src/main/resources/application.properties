# ── Server ──────────────────────────────────────────────
server.port=8080

# ── H2 In-Memory Database ────────────────────────────────
spring.datasource.url=jdbc:h2:mem:settlementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# H2 Console — useful for inspecting DB during dev
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Kafka ─────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Consumer
spring.kafka.consumer.group-id=bet-settlement-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.sporty.settlement.model
spring.kafka.consumer.properties.spring.json.value.default.type=com.sporty.settlement.model.EventOutcome

# ── Logging ───────────────────────────────────────────────
logging.level.com.sporty.settlement=INFO
logging.level.org.apache.kafka=WARN

# Kafka listener concurrency — increase for parallel processing
spring.kafka.listener.concurrency=1

# Disable auto-startup for easier local testing if needed
spring.kafka.listener.auto-startup=true
